worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Rate limiting ────────────────────────────────────────────────────────
    # Protect the signaling server from HTTP-level floods
    limit_req_zone $binary_remote_addr zone=signal:10m rate=20r/s;

    # ── Security headers (applied globally) ──────────────────────────────────
    add_header X-Frame-Options           DENY              always;
    add_header X-Content-Type-Options    nosniff           always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Permissions-Policy        "microphone=self" always;
    # CSP: tighten once you know all your asset origins
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' wss:; media-src 'self';"
        always;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name tincan.example.com; # ← replace with your domain

        # TLS — place your certs in ./nginx/certs/
        # Recommended: use Certbot / Let's Encrypt
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Signaling server (Socket.io + REST) ────────────────────────────
        # All /signal/ traffic routes to the Node.js server
        location /signal/ {
            limit_req zone=signal burst=40 nodelay;

            proxy_pass http://server:3001/;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client IP so TRUST_PROXY=true works correctly
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep WebSocket connections alive for the call duration
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── Next.js client ─────────────────────────────────────────────────
        location / {
            proxy_pass http://client:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR websocket (dev only — harmless in prod)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Next.js static assets — long-cache ─────────────────────────────
        location /_next/static/ {
            proxy_pass http://client:3000/_next/static/;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
