services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Signaling server ───────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:       production
      PORT:           "3001"
      REDIS_URL:      redis://redis:6379
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      TRUST_PROXY:    "true"
      HEALTH_API_KEY: ${HEALTH_API_KEY}
      TURN_URL:       ${TURN_URL}
      TURN_SECRET:    ${TURN_SECRET}
    networks:
      - internal
    # No ports exposed — nginx handles all external traffic

  # ── Next.js client ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SIGNAL_URL: ${NEXT_PUBLIC_SIGNAL_URL}
        NEXT_PUBLIC_ICE_POLICY: relay
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - internal

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro     # mount TLS certs here
    networks:
      - internal

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
